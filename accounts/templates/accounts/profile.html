<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot - First Aid Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
    --primary-blue: #0052cc;
    --light-blue-bg: #f4f7fc;
    --card-bg: #ffffff;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --accent-red: #faeae8;
    --text-red: #d9381e;
    --border-color: #e2e8f0;
    --nav-active: #0052cc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background-color: #cbd5e1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.app-container {
    width: 390px;
    height: 844px;
    background-color: var(--light-blue-bg);
    border-radius: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    border: 8px solid #475569;
}

.app-header {
    background: var(--light-blue-bg);
    padding: 20px 24px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.app-header .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #006699;
    font-size: 20px;
    font-weight: 700;
}

.mini-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--primary-blue);
}

.main-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 100px;
}

.main-content::-webkit-scrollbar {
    display: none;
}

.profile-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 16px;
}

.avatar-container {
    position: relative;
    width: 90px;
    height: 90px;
    margin: 0 auto 12px;
}

#profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.status-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 16px;
    height: 16px;
    background-color: #22c55e;
    border: 3px solid var(--card-bg);
    border-radius: 50%;
}

.profile-card h2 {
    color: var(--text-dark);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
}

.account-type {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 18px;
}

.profile-actions {
    display: flex;
    gap: 12px;
}

.btn {
    flex: 1;
    padding: 11px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
}

.btn-primary {
    background-color: var(--primary-blue);
    color: white;
}

.btn-secondary {
    background-color: #eef2ff;
    color: var(--primary-blue);
}

.info-section {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--primary-blue);
    font-weight: bold;
}

.toggle-trigger { 
    cursor: pointer; 
}

.section-header h3 {
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.chevron {
    color: #94a3b8;
    font-size: 14px;
    transition: transform 0.2s ease;
}

.section-content { 
    margin-top: 14px; 
    transition: max-height 0.3s ease-out, opacity 0.2s ease;
    overflow: hidden;
}

/* Accordion Closed States */
.info-section.closed .collapsible {
    max-height: 0 !important;
    margin-top: 0;
    opacity: 0;
    pointer-events: none;
}

.info-section.closed .chevron {
    transform: rotate(180deg);
}

.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
}

.info-row:last-child {
    border-bottom: none;
}

.label {
    color: var(--text-muted);
    font-size: 14px;
}

.value {
    font-size: 14px;
}

.text-dark { color: var(--text-dark); }
.font-bold { font-weight: 600; }

.badge-blood {
    background-color: var(--accent-red);
    color: var(--text-red);
    padding: 4px 12px;
    border-radius: 12px;
}

/* Contacts and Logs styling */
.contact-card, .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
}

.contact-card:last-of-type, .log-item:nth-last-of-type(2) {
    border-bottom: none;
}

.contact-details, .log-details {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.contact-name, .log-title {
    color: var(--text-dark);
    font-size: 14px;
    font-weight: 600;
}

.contact-phone, .log-meta {
    color: var(--text-muted);
    font-size: 12px;
}

.call-btn {
    width: 36px;
    height: 36px;
    background-color: #f0fdf4;
    color: #16a34a;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
}

.log-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 12px;
}

.icon-bg-blue { background-color: #eff6ff; color: #3b82f6; }
.icon-bg-cyan { background-color: #ecfeff; color: #06b6d4; }

.arrow-right {
    color: #cbd5e1;
    font-size: 12px;
}

.btn-outline-dashed {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1.5px dashed var(--border-color);
    border-radius: 14px;
    color: var(--primary-blue);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
}

/* Bottom Nav bar */
.bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 75px;
    background: #ffffff;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-bottom: 15px;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
}

.nav-item i {
    font-size: 20px;
}

.nav-item.active {
    color: var(--nav-active);
}

    </style>

</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-briefcase-medical"></i>
            <span>MediBot</span>
        </div>
        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150&auto=format&fit=crop" class="mini-avatar" alt="Avatar Mini">
    </header>

    <main class="main-content">
        <section class="profile-card">
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=150&auto=format&fit=crop" id="profile-img" alt="Profile Image">
                <span class="status-dot"></span>
            </div>
            <h2>Sarah Johnson</h2>
            <p class="account-type">Standard Patient Account</p>
            <div class="profile-actions">
                <button class="btn btn-primary" id="edit-btn">Edit Profile</button>
                <button class="btn btn-secondary">Share Health ID</button>
            </div>
        </section>

        <section class="info-section">
            <div class="section-header no-toggle">
                <h3><i class="fa-regular fa-user icon-blue"></i> Basic Info</h3>
            </div>
            <div class="section-content">
                <div class="info-row">
                    <span class="label">Age</span>
                    <span class="value text-dark font-bold" id="info-age">28</span>
                </div>
                <div class="info-row">
                    <span class="label">Blood Type</span>
                    <span class="value badge-blood font-bold">A+</span>
                </div>
                <div class="info-row">
                    <span class="label">Allergies</span>
                    <span class="value text-dark font-bold" id="info-allergies">Penicillin</span>
                </div>
            </div>
        </section>

        <section class="info-section accordion">
            <div class="section-header toggle-trigger">
                <h3><i class="fa-solid fa-asterisk icon-blue"></i> Emergency Contacts</h3>
                <i class="fa-solid fa-chevron-up chevron"></i>
            </div>
            <div class="section-content collapsible">
                <div class="contact-card">
                    <div class="contact-details">
                        <span class="contact-name">Mark Johnson (Husband)</span>
                        <span class="contact-phone">555-0102</span>
                    </div>
                    <a href="tel:5550102" class="call-btn"><i class="fa-solid fa-phone"></i></a>
                </div>
                <div class="contact-card">
                    <div class="contact-details">
                        <span class="contact-name">Dr. Lee (PCP)</span>
                        <span class="contact-phone">555-0199</span>
                    </div>
                    <a href="tel:5550199" class="call-btn"><i class="fa-solid fa-phone"></i></a>
                </div>
            </div>
        </section>

        <section class="info-section accordion">
            <div class="section-header toggle-trigger">
                <h3><i class="fa-solid fa-clock-rotate-left icon-blue"></i> Chat History & Logs</h3>
                <i class="fa-solid fa-chevron-up chevron"></i>
            </div>
            <div class="section-content collapsible">
                <div class="log-item">
                    <div class="log-icon icon-bg-blue"><i class="fa-solid fa-notes-medical"></i></div>
                    <div class="log-details">
                        <span class="log-title">Severe Headache</span>
                        <span class="log-meta">Jan 12, 2023 &bull; 5:24 PM</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </div>
                <div class="log-item">
                    <div class="log-icon icon-bg-cyan"><i class="fa-solid fa-bandage"></i></div>
                    <div class="log-details">
                        <span class="log-title">Ankle Sprain</span>
                        <span class="log-meta">Jan 10, 2023 &bull; 11:15 AM</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </div>
                <button class="btn-outline-dashed">View Full Medical Log</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="{% url 'chat:chat' %}"class="nav-item"><i class="fa-regular fa-comment-dots"></i><span>Chat</span></a>

        <a href="{% url 'history:history' %}" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
        <a href="#" class="nav-item active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>
</div>




    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const accordions = document.querySelectorAll('.info-section.accordion');

    accordions.forEach(accordion => {
        const trigger = accordion.querySelector('.toggle-trigger');
        const content = accordion.querySelector('.collapsible');
        
        // Set initial max-height dynamically for smooth transiton
        content.style.maxHeight = content.scrollHeight + "px";

        trigger.addEventListener('click', () => {
            const isClosed = accordion.classList.toggle('closed');
            
            if (isClosed) {
                content.style.maxHeight = "0px";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
            }
        });
    });
});

    </script>
</body>
</html>
