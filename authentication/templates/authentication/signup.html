<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MediBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #f4f7fe;
            --brand-blue: #0056c6;
            --brand-teal: #006672;
            --gradient-start: #0284c7; 
            --gradient-end: #0f766e;   
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --alert-bg: #fee2e2;
            --alert-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: all 0.2s ease;
        }

        body {
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CARD ONLY - NO RIGID HEIGHT CONTAINER */
        .auth-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 40px 24px; 
        }

        .brand-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .logo-icon-box {
            font-size: 38px;
            color: var(--brand-teal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-display h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .brand-display p {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 500;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            align-self: flex-start;
            margin-bottom: 16px;
        }

        .message {
            background-color: var(--alert-bg);
            color: var(--alert-text);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .field-wrapper i.input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-gray);
            font-size: 14px;
            pointer-events: none;
        }

        .field-wrapper i.toggle-password {
            position: absolute;
            right: 16px;
            color: var(--text-gray);
            font-size: 14px;
            cursor: pointer;
        }

        form input {
            width: 100%;
            padding: 12px 16px 12px 42px; 
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background-color: white;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
        }

        form input:focus {
            border-color: var(--brand-teal);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        form input::placeholder {
            color: #94a3b8;
        }

        .btn-gradient {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
            margin-top: 8px;
            text-align: center;
            text-decoration: none;
        }

        .btn-gradient:active {
            transform: scale(0.99);
            opacity: 0.95;
        }

        .social-divider {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 16px 0;
            color: #94a3b8;
            font-size: 12px;
        }
        .social-divider::before, .social-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
            margin: 0 10px;
        }

        .btn-oauth {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background-color: white;
            color: var(--text-dark);
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-oauth:hover {
            background-color: #f8fafc;
        }

        .links-hub {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-gray);
            width: 100%;
        }

        .links-hub a {
            color: var(--brand-teal);
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
        }

        .links-hub a:hover {
            color: var(--brand-blue);
            text-decoration: underline;
        }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <div class="auth-card">
        
        <div class="brand-display">
            <div class="logo-icon-box">
                <i class="fa-solid fa-square-plus"></i>
            </div>
            <h1>MediBot</h1>
            <p>First Aid Assistant</p>
        </div>

        <h2>Create Account</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}
<form method="post">
    {% csrf_token %}

    <!-- Displays all validation error banners -->
    {% if messages %}
        <div class="messages-container" style="margin-bottom: 15px;">
            {% for message in messages %}
                <div class="alert alert-danger" style="color: #ff4d4d; font-size: 14px; font-weight: bold; margin-bottom: 5px;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="field-wrapper">
        <i class="fa-regular fa-user input-icon"></i>
        <input type="text" name="username" placeholder="Name" value="{{ request.POST.username }}" required>
    </div>

    <div class="field-wrapper">
        <i class="fa-regular fa-envelope input-icon"></i>
        <input type="email" name="email" placeholder="Email" value="{{ request.POST.email }}" required>
    </div>

    <div class="field-wrapper">
        <i class="fa-regular fa-phone input-icon"></i>
        <input type="text" name="phone_number" placeholder="Phone Number" value="{{ request.POST.phone_number }}" required>
    </div>

    <div class="field-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" name="password1" placeholder="Password" id="pass1" required>
        <i class="fa-regular fa-eye-slash toggle-password" onclick="toggleVisibility('pass1', this)"></i>
    </div>

    <div class="field-wrapper">
        <i class="fa-solid fa-shield-halved input-icon"></i>
        <input type="password" name="password2" placeholder="Confirm Password" id="pass2" required>
        <i class="fa-regular fa-eye-slash toggle-password" onclick="toggleVisibility('pass2', this)"></i>
    </div>

    <button type="submit" class="btn-gradient">Sign Up</button>
</form>



        <div class="social-divider">or</div>
        <button class="btn-oauth">
            <i class="fa-brands fa-google" style="color: #ea4335;"></i>
            Sign in with Google/Apple
        </button>

        <div class="links-hub">
            Already have an account?<a href="{% url 'login' %}">Login</a>
        </div>

    </div>

    <script>
        function toggleVisibility(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconEl.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                iconEl.classList.replace("fa-eye", "fa-eye-slash");
            }
        }
    </script>

</body>
</html>
